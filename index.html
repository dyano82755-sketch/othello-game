<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>10x10マインスイーパー</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --cell: #16213e;
      --text: #e0e0e0;
      --flag: #ff6b6b;
      --mine: #ff0000;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --radius: 8px;
      --transition: all 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 90vw;
      max-width: 500px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .game-info {
      display: flex;
      gap: 15px;
    }

    .info-item {
      background: rgba(0,0,0,0.2);
      padding: 8px 15px;
      border-radius: var(--radius);
      font-weight: 600;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      width: 100%;
      aspect-ratio: 1/1;
    }

    .cell {
      background: var(--cell);
      border-radius: var(--radius);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 1.2em;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow);
      user-select: none;
    }

    .cell:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.1);
    }

    .cell.revealed {
      background: rgba(255,255,255,0.1);
      transform: scale(1);
    }

    .cell.flagged::after {
      content: "🚩";
    }

    .cell.mine.revealed {
      background: var(--mine);
    }

    .cell.mine.revealed::after {
      content: "💣";
    }

    .cell-1 { color: #4ecdc4; }
    .cell-2 { color: #45b7d1; }
    .cell-3 { color: #ff6b6b; }
    .cell-4 { color: #9b59b6; }
    .cell-5 { color: #e74c3c; }
    .cell-6 { color: #1abc9c; }
    .cell-7 { color: #000000; }
    .cell-8 { color: #95a5a6; }

    .controls {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 1em;
      background: #00b4d8;
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }

    button:hover {
      background: #00a0c0;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      padding: 10px;
      border-radius: var(--radius);
      text-align: center;
      font-weight: bold;
      min-height: 20px;
    }

    .win {
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
    }

    .lose {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
    }

    @media (max-width: 500px) {
      .game-container {
        padding: 15px;
      }
      
      .cell {
        font-size: 1em;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="game-info">
        <div class="info-item">旗: <span id="flagCount">15</span></div>
        <div class="info-item">爆弾: <span id="mineCount">15</span></div>
      </div>
    </div>

    <div id="grid"></div>

    <div class="message" id="message"></div>

    <div class="controls">
      <button id="resetBtn">リセット</button>
    </div>
  </div>

  <script>
    class Minesweeper {
      constructor() {
        this.gridSize = 10;
        this.minesCount = 15;
        this.board = [];
        this.revealed = [];
        this.flagged = [];
        this.gameOver = false;
        this.gameWon = false;
        this.firstClick = true;
        this.flagCount = this.minesCount;
        
        this.gridElement = document.getElementById('grid');
        this.flagCountElement = document.getElementById('flagCount');
        this.mineCountElement = document.getElementById('mineCount');
        this.messageElement = document.getElementById('message');
        this.resetBtn = document.getElementById('resetBtn');
        
        this.init();
      }

      init() {
        this.resetGame();
        this.bindEvents();
      }

      resetGame() {
        this.board = [];
        this.revealed = [];
        this.flagged = [];
        this.gameOver = false;
        this.gameWon = false;
        this.firstClick = true;
        this.flagCount = this.minesCount;
        
        this.flagCountElement.textContent = this.flagCount;
        this.messageElement.textContent = '';
        this.messageElement.className = 'message';
        
        this.createBoard();
        this.renderBoard();
      }

      createBoard() {
        // ボードの初期化
        for (let i = 0; i < this.gridSize; i++) {
          this.board[i] = [];
          this.revealed[i] = [];
          this.flagged[i] = [];
          for (let j = 0; j < this.gridSize; j++) {
            this.board[i][j] = 0;
            this.revealed[i][j] = false;
            this.flagged[i][j] = false;
          }
        }
      }

      renderBoard() {
        this.gridElement.innerHTML = '';
        
        for (let i = 0; i < this.gridSize; i++) {
          for (let j = 0; j < this.gridSize; j++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.row = i;
            cell.dataset.col = j;
            
            if (this.revealed[i][j]) {
              cell.classList.add('revealed');
              if (this.board[i][j] === -1) {
                cell.classList.add('mine');
              } else if (this.board[i][j] > 0) {
                cell.textContent = this.board[i][j];
                cell.classList.add(`cell-${this.board[i][j]}`);
              }
            } else if (this.flagged[i][j]) {
              cell.classList.add('flagged');
            }
            
            this.gridElement.appendChild(cell);
          }
        }
      }

      placeMines(firstRow, firstCol) {
        let minesPlaced = 0;
        while (minesPlaced < this.minesCount) {
          const row = Math.floor(Math.random() * this.gridSize);
          const col = Math.floor(Math.random() * this.gridSize);
          
          // 最初のクリック位置は爆弾にしない
          if ((row === firstRow && col === firstCol) || this.board[row][col] === -1) {
            continue;
          }
          
          this.board[row][col] = -1;
          minesPlaced++;
          
          // 周囲の数字を増やす
          for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
              const newRow = row + i;
              const newCol = col + j;
              if (newRow >= 0 && newRow < this.gridSize && newCol >= 0 && newCol < this.gridSize) {
                if (this.board[newRow][newCol] !== -1) {
                  this.board[newRow][newCol]++;
                }
              }
            }
          }
        }
      }

      handleCellClick(row, col) {
        if (this.gameOver || this.gameWon || this.flagged[row][col]) return;
        
        if (this.firstClick) {
          this.placeMines(row, col);
          this.firstClick = false;
        }
        
        if (this.board[row][col] === -1) {
          this.revealMines();
          this.gameOver = true;
          this.messageElement.textContent = 'ゲームオーバー！';
          this.messageElement.className = 'message lose';
          return;
        }
        
        this.revealCell(row, col);
        this.checkWin();
      }

      revealCell(row, col) {
        if (row < 0 || row >= this.gridSize || col < 0 || col >= this.gridSize) return;
        if (this.revealed[row][col] || this.flagged[row][col]) return;
        
        this.revealed[row][col] = true;
        
        if (this.board[row][col] === 0) {
          // 空セルなら周囲も開く
          for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
              this.revealCell(row + i, col + j);
            }
          }
        }
        
        this.renderBoard();
      }

      revealMines() {
        for (let i = 0; i < this.gridSize; i++) {
          for (let j = 0; j < this.gridSize; j++) {
            if (this.board[i][j] === -1) {
              this.revealed[i][j] = true;
            }
          }
        }
        this.renderBoard();
      }

      handleCellRightClick(row, col) {
        if (this.gameOver || this.gameWon || this.revealed[row][col]) return;
        
        this.flagged[row][col] = !this.flagged[row][col];
        this.flagCount += this.flagged[row][col] ? -1 : 1;
        this.flagCountElement.textContent = this.flagCount;
        
        this.renderBoard();
      }

      checkWin() {
        let revealedCount = 0;
        for (let i = 0; i < this.gridSize; i++) {
          for (let j = 0; j < this.gridSize; j++) {
            if (this.revealed[i][j]) {
              revealedCount++;
            }
          }
        }
        
        if (revealedCount === this.gridSize * this.gridSize - this.minesCount) {
          this.gameWon = true;
          this.messageElement.textContent = '勝利！';
          this.messageElement.className = 'message win';
        }
      }

      bindEvents() {
        this.gridElement.addEventListener('click', (e) => {
          if (e.target.classList.contains('cell')) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            this.handleCellClick(row, col);
          }
        });

        this.gridElement.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          if (e.target.classList.contains('cell')) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            this.handleCellRightClick(row, col);
          }
        });

        this.resetBtn.addEventListener('click', () => {
          this.resetGame();
        });
      }
    }

    // ゲームの初期化
    const game = new Minesweeper();
  </script>
</body>
</html>
