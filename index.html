<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブロック崩しゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a2980, #26d0ce);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        #header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-weight: bold;
        }

        #score-display {
            font-size: 20px;
        }

        #lives-display {
            font-size: 20px;
        }

        #game-area {
            position: relative;
            width: 100%;
            height: calc(100% - 50px);
            background: #000;
        }

        #paddle {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 10px;
            background: #2196f3;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.5);
        }

        #ball {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 235, 59, 0.5);
        }

        .block {
            position: absolute;
            width: 35px;
            height: 15px;
            border-radius: 3px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .block-red { background: #ff5252; }
        .block-pink { background: #ff4081; }
        .block-purple { background: #e040fb; }
        .block-deep-purple { background: #7c4dff; }
        .block-indigo { background: #536dfe; }
        .block-blue { background: #448aff; }

        #game-over, #game-clear {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            z-index: 10;
        }

        #game-over h2, #game-clear h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff5252;
        }

        #game-clear h2 {
            color: #4caf50;
        }

        #final-score {
            font-size: 24px;
            margin-bottom: 30px;
        }

        #restart-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #restart-btn:hover {
            background: #0d47a1;
            transform: scale(1.05);
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            z-index: 10;
        }

        #start-screen h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #2196f3;
        }

        #start-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        #start-btn:hover {
            background: #2e7d32;
            transform: scale(1.05);
        }

        #instructions {
            margin-top: 20px;
            font-size: 14px;
            color: #ccc;
            max-width: 80%;
        }

        @media (max-width: 480px) {
            #game-container {
                width: 320px;
                height: 480px;
            }
            
            #game-over h2, #game-clear h2 {
                font-size: 28px;
            }
            
            #final-score {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div id="score-display">スコア: 0</div>
            <div id="lives-display">ライフ: 3</div>
        </div>
        <div id="game-area">
            <div id="paddle"></div>
            <div id="ball"></div>
        </div>
        
        <div id="game-over">
            <h2>ゲームオーバー</h2>
            <div id="final-score">最終スコア: 0</div>
            <button id="restart-btn">再挑戦</button>
        </div>
        
        <div id="game-clear">
            <h2>クリア!</h2>
            <div id="final-score">最終スコア: 0</div>
            <button id="restart-btn">もう一度</button>
        </div>
        
        <div id="start-screen">
            <h1>ブロック崩し</h1>
            <button id="start-btn">ゲーム開始</button>
            <div id="instructions">
                マウスを動かしてパドルを操作して、ボールを反射させましょう。<br>
                ブロックをすべて壊すとクリアです！
            </div>
        </div>
    </div>

    <script>
        // ゲーム変数
        const gameArea = document.getElementById('game-area');
        const paddle = document.getElementById('paddle');
        const ball = document.getElementById('ball');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const gameOverScreen = document.getElementById('game-over');
        const gameClearScreen = document.getElementById('game-clear');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreDisplay = document.getElementById('final-score');

        // ゲーム状態
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let ballDx = 0;
        let ballDy = 0;
        let gameInterval;

        // ブロック配列
        let blocks = [];

        // ゲーム初期化
        function initGame() {
            // スコアとライフ初期化
            score = 0;
            lives = 3;
            scoreDisplay.textContent = `スコア: ${score}`;
            livesDisplay.textContent = `ライフ: ${lives}`;

            // パドル初期化
            paddle.style.left = '50%';
            paddle.style.transform = 'translateX(-50%)';

            // ボール初期化
            ball.style.left = '50%';
            ball.style.top = '50%';
            ballDx = 4;
            ballDy = -4;

            // ブロック初期化
            clearBlocks();
            createBlocks();

            // ゲーム状態初期化
            gameRunning = true;
        }

        // ブロック生成
        function createBlocks() {
            const blockRows = 6;
            const blockCols = 10;
            const blockWidth = 35;
            const blockHeight = 15;
            const blockPadding = 5;
            const offsetTop = 60;
            const offsetLeft = 20;
            const colors = ['block-red', 'block-pink', 'block-purple', 'block-deep-purple', 'block-indigo', 'block-blue'];

            blocks = [];
            for (let r = 0; r < blockRows; r++) {
                for (let c = 0; c < blockCols; c++) {
                    const block = document.createElement('div');
                    block.className = `block ${colors[r]}`;
                    block.style.left = `${c * (blockWidth + blockPadding) + offsetLeft}px`;
                    block.style.top = `${r * (blockHeight + blockPadding) + offsetTop}px`;
                    block.style.width = `${blockWidth}px`;
                    block.style.height = `${blockHeight}px`;
                    gameArea.appendChild(block);
                    blocks.push(block);
                }
            }
        }

        // ブロック削除
        function clearBlocks() {
            blocks.forEach(block => {
                if (block.parentNode) {
                    block.parentNode.removeChild(block);
                }
            });
            blocks = [];
        }

        // パドル移動
        function movePaddle(e) {
            if (!gameRunning) return;
            
            const gameAreaRect = gameArea.getBoundingClientRect();
            const mouseX = e.clientX - gameAreaRect.left;
            const paddleWidth = paddle.offsetWidth;
            const maxX = gameAreaRect.width - paddleWidth;
            
            let newX = mouseX - paddleWidth / 2;
            newX = Math.max(0, Math.min(newX, maxX));
            
            paddle.style.left = `${newX}px`;
        }

        // ボール移動
        function moveBall() {
            if (!gameRunning) return;

            const ballRect = ball.getBoundingClientRect();
            const gameAreaRect = gameArea.getBoundingClientRect();
            const paddleRect = paddle.getBoundingClientRect();
            
            // ボールの位置更新
            let ballLeft = parseFloat(ball.style.left);
            let ballTop = parseFloat(ball.style.top);
            
            ballLeft += ballDx;
            ballTop += ballDy;
            
            // 壁との衝突（左右）
            if (ballLeft <= 0 || ballLeft + ballRect.width >= gameAreaRect.width) {
                ballDx = -ballDx;
                ballLeft = ballLeft <= 0 ? 0 : gameAreaRect.width - ballRect.width;
            }

            // 壁との衝突（上）
            if (ballTop <= 0) {
                ballDy = -ballDy;
                ballTop = 0;
            }

            // パドルとの衝突
            if (
                ballTop + ballRect.height > paddleRect.top &&
                ballTop < paddleRect.bottom &&
                ballLeft + ballRect.width > paddleRect.left &&
                ballLeft < paddleRect.right
            ) {
                // パドルの中心からボールの位置を計算して角度を変える
                const hitPosition = (ballLeft + ballRect.width / 2 - (paddleRect.left + paddleRect.width / 2)) / (paddleRect.width / 2);
                ballDx = hitPosition * 5;
                ballDy = -Math.abs(ballDy);
            }

            // ブロックとの衝突
            for (let i = 0; i < blocks.length; i++) {
                const block = blocks[i];
                if (!block) continue;
                
                const blockRect = block.getBoundingClientRect();
                
                if (
                    ballTop + ballRect.height > blockRect.top &&
                    ballTop < blockRect.bottom &&
                    ballLeft + ballRect.width > blockRect.left &&
                    ballLeft < blockRect.right
                ) {
                    ballDy = -ballDy;
                    block.parentNode.removeChild(block);
                    blocks.splice(i, 1);
                    score += 10;
                    scoreDisplay.textContent = `スコア: ${score}`;
                    
                    // クリア判定
                    if (blocks.length === 0) {
                        endGame(true);
                    }
                    break;
                }
            }

            // ボールが下に落ちた場合
            if (ballTop + ballRect.height > gameAreaRect.height) {
                lives--;
                livesDisplay.textContent = `ライフ: ${lives}`;
                
                if (lives <= 0) {
                    endGame(false);
                } else {
                    // ボールをリセット
                    ballLeft = gameAreaRect.width / 2 - ballRect.width / 2;
                    ballTop = gameAreaRect.height / 2 - ballRect.height / 2;
                    ballDx = 4 * (Math.random() > 0.5 ? 1 : -1);
                    ballDy = -4;
                }
            }

            // ボール位置更新
            ball.style.left = `${ballLeft}px`;
            ball.style.top = `${ballTop}px`;
        }

        // ゲーム終了
        function endGame(isWin) {
            gameRunning = false;
            clearInterval(gameInterval);
            finalScoreDisplay.textContent = `最終スコア: ${score}`;
            
            if (isWin) {
                gameClearScreen.style.display = 'flex';
            } else {
                gameOverScreen.style.display = 'flex';
            }
        }

        // ゲームループ
        function gameLoop() {
            moveBall();
        }

        // ゲーム開始
        function startGame() {
            startScreen.style.display = 'none';
            initGame();
            gameInterval = setInterval(gameLoop, 16);
        }

        // ゲームリセット
        function resetGame() {
            gameOverScreen.style.display = 'none';
            gameClearScreen.style.display = 'none';
            startGame();
        }

        // イベントリスナー
        window.addEventListener('mousemove', movePaddle);
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', resetGame);

        // 初期化
        initGame();
    </script>
</body>
</html>
