<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>モダンブロック崩しゲーム</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --paddle: #00b4d8;
      --ball: #ff6b6b;
      --brick: #4ecdc4;
      --text: #ffffff;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --radius: 8px;
      --transition: all 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .game-container {
      display: grid;
      grid-template-columns: 1fr 200px;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      width: 90vw;
      max-width: 1200px;
      height: 90vh;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .score-panel {
      grid-column: 1 / 3;
      grid-row: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      background: rgba(0,0,0,0.2);
      border-radius: var(--radius);
      font-size: 1.2em;
      font-weight: 600;
    }

    .score-panel span {
      padding: 4px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: var(--radius);
      transition: var(--transition);
    }

    .score-panel span:hover {
      background: rgba(255,255,255,0.2);
    }

    .game-area {
      grid-column: 1 / 3;
      grid-row: 2;
      position: relative;
      background: rgba(0,0,0,0.1);
      border-radius: var(--radius);
      overflow: hidden;
      height: 100%;
    }

    .paddle {
      position: absolute;
      bottom: 20px;
      width: 120px;
      height: 16px;
      background: var(--paddle);
      border-radius: var(--radius);
      transition: var(--transition);
      box-shadow: var(--shadow);
    }

    .paddle:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 16px rgba(0,180,216,0.4);
    }

    .ball {
      position: absolute;
      width: 16px;
      height: 16px;
      background: var(--ball);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255,107,107,0.6);
      transition: var(--transition);
    }

    .brick {
      position: absolute;
      width: 80px;
      height: 24px;
      background: var(--brick);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    .brick:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .brick.destroyed {
      opacity: 0;
      transition: opacity 0.2s ease-out;
    }

    .controls {
      grid-column: 1 / 3;
      grid-row: 3;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      font-size: 1em;
      background: var(--paddle);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }

    button:hover {
      background: #00a0c0;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .game-container {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 12px;
      }

      .score-panel {
        justify-content: space-around;
      }

      .paddle {
        width: 100px;
      }

      .brick {
        width: 60px;
        height: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="score-panel">
      <span>スコア: <span id="score">0</span></span>
      <span>ライフ: <span id="lives">3</span></span>
      <span>レベル: <span id="level">1</span></span>
    </div>

    <div class="game-area" id="gameArea">
      <!-- パドルとボールはJavaScriptで動的に追加 -->
    </div>

    <div class="controls">
      <button id="startBtn">スタート</button>
      <button id="pauseBtn" disabled>一時停止</button>
      <button id="restartBtn">リスタート</button>
    </div>
  </div>

  <script>
    class Game {
      constructor() {
        this.gameArea = document.getElementById('gameArea');
        this.scoreEl = document.getElementById('score');
        this.livesEl = document.getElementById('lives');
        this.levelEl = document.getElementById('level');

        this.score = 0;
        this.lives = 3;
        this.level = 1;
        this.gameState = 'start'; // start, playing, paused, gameOver, victory
        this.bricks = [];
        this.paddle = null;
        this.ball = null;
        this.interval = null;
        this.velocityX = 3;
        this.velocityY = -3;
        this.brickRowCount = 4;
        this.brickColumnCount = 8;
        this.brickWidth = 80;
        this.brickHeight = 24;
        this.brickPadding = 10;
        this.brickOffsetTop = 60;
        this.brickOffsetLeft = 20;

        this.init();
      }

      init() {
        this.createPaddle();
        this.createBall();
        this.createBricks();
        this.bindEvents();
      }

      createPaddle() {
        this.paddle = document.createElement('div');
        this.paddle.className = 'paddle';
        this.paddle.style.left = '50%';
        this.paddle.style.transform = 'translateX(-50%)';
        this.gameArea.appendChild(this.paddle);
      }

      createBall() {
        this.ball = document.createElement('div');
        this.ball.className = 'ball';
        this.ball.style.left = '50%';
        this.ball.style.top = '400px';
        this.ball.style.transform = 'translateX(-50%)';
        this.gameArea.appendChild(this.ball);
      }

      createBricks() {
        this.bricks = [];
        const areaWidth = this.gameArea.clientWidth;
        const totalWidth = this.brickColumnCount * (this.brickWidth + this.brickPadding) - this.brickPadding;
        const startX = (areaWidth - totalWidth) / 2;

        for (let row = 0; row < this.brickRowCount; row++) {
          for (let col = 0; col < this.brickColumnCount; col++) {
            const brick = document.createElement('div');
            brick.className = 'brick';
            brick.style.left = `${startX + col * (this.brickWidth + this.brickPadding)}px`;
            brick.style.top = `${this.brickOffsetTop + row * (this.brickHeight + this.brickPadding)}px`;
            brick.dataset.row = row;
            brick.dataset.col = col;
            this.gameArea.appendChild(brick);
            this.bricks.push(brick);
          }
        }
      }

      bindEvents() {
        document.getElementById('startBtn').addEventListener('click', () => this.start());
        document.getElementById('pauseBtn').addEventListener('click', () => this.pause());
        document.getElementById('restartBtn').addEventListener('click', () => this.restart());

        this.gameArea.addEventListener('mousemove', (e) => {
          if (this.gameState !== 'playing') return;
          const rect = this.gameArea.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const paddleWidth = this.paddle.offsetWidth;
          const left = Math.max(0, Math.min(x - paddleWidth / 2, rect.width - paddleWidth));
          this.paddle.style.left = `${left}px`;
        });
      }

      start() {
        if (this.gameState !== 'start') return;
        this.gameState = 'playing';
        document.getElementById('startBtn').disabled = true;
        document.getElementById('pauseBtn').disabled = false;
        this.updateScore();
        this.run();
      }

      pause() {
        if (this.gameState !== 'playing') return;
        this.gameState = 'paused';
        document.getElementById('pauseBtn').textContent = '再開';
        clearInterval(this.interval);
      }

      resume() {
        if (this.gameState !== 'paused') return;
        this.gameState = 'playing';
        document.getElementById('pauseBtn').textContent = '一時停止';
        this.run();
      }

      run() {
        this.interval = setInterval(() => {
          if (this.gameState !== 'playing') return;
          this.moveBall();
          this.checkCollisions();
          this.checkGameEnd();
        }, 20);
      }

      moveBall() {
        const ballRect = this.ball.getBoundingClientRect();
        const gameRect = this.gameArea.getBoundingClientRect();

        let newLeft = ballRect.left - gameRect.left + this.velocityX;
        let newTop = ballRect.top - gameRect.top + this.velocityY;

        // ボールの壁反射
        if (newLeft <= 0 || newLeft >= gameRect.width - this.ball.offsetWidth) {
          this.velocityX *= -1;
        }
        if (newTop <= 0) {
          this.velocityY *= -1;
        }

        // パドルに当たったか
        const paddleRect = this.paddle.getBoundingClientRect();
        if (newTop + this.ball.offsetHeight >= paddleRect.top &&
            newTop <= paddleRect.bottom &&
            newLeft + this.ball.offsetWidth >= paddleRect.left &&
            newLeft <= paddleRect.right) {
          this.velocityY *= -1;
          // パドルの中心で反射角度を変える
          const hitPos = (newLeft + this.ball.offsetWidth / 2 - paddleRect.left) / paddleRect.width;
          this.velocityX = (hitPos - 0.5) * 6;
        }

        // ボールが下に落ちた
        if (newTop >= gameRect.height) {
          this.lives--;
          this.updateLives();
          if (this.lives <= 0) {
            this.gameOver();
          } else {
            this.resetBall();
          }
        }

        // 更新
        this.ball.style.left = `${newLeft}px`;
        this.ball.style.top = `${newTop}px`;
      }

      checkCollisions() {
        this.bricks.forEach(brick => {
          if (brick.classList.contains('destroyed')) return;
          const brickRect = brick.getBoundingClientRect();
          const ballRect = this.ball.getBoundingClientRect();
          const ballCenterX = ballRect.left + ballRect.width / 2;
          const ballCenterY = ballRect.top + ballRect.height / 2;
          const brickCenterX = brickRect.left + brickRect.width / 2;
          const brickCenterY = brickRect.top + brickRect.height / 2;

          const dx = ballCenterX - brickCenterX;
          const dy = ballCenterY - brickCenterY;
          const width = brickRect.width / 2;
          const height = brickRect.height / 2;

          if (Math.abs(dx) < width + this.ball.offsetWidth / 2 && Math.abs(dy) < height + this.ball.offsetHeight / 2) {
            // 衝突判定
            if (Math.abs(dx) > Math.abs(dy)) {
              this.velocityX *= -1;
            } else {
              this.velocityY *= -1;
            }
            brick.classList.add('destroyed');
            this.score += 10;
            this.updateScore();
            this.checkVictory();
          }
        });
      }

      checkVictory() {
        if (this.bricks.filter(b => !b.classList.contains('destroyed')).length === 0) {
          this.level++;
          this.updateLevel();
          this.resetBall();
          this.createBricks();
          this.velocityY = -3 - this.level * 0.5;
          this.velocityX = Math.sign(this.velocityX) * (3 + this.level * 0.3);
        }
      }

      resetBall() {
        this.ball.style.left = '50%';
        this.ball.style.top = '400px';
        this.ball.style.transform = 'translateX(-50%)';
        this.velocityX = 3 * (Math.random() > 0.5 ? 1 : -1);
        this.velocityY = -3;
      }

      updateScore() {
        this.scoreEl.textContent = this.score;
      }

      updateLives() {
        this.livesEl.textContent = this.lives;
      }

      updateLevel() {
        this.levelEl.textContent = this.level;
      }

      checkGameEnd() {
        if (this.lives <= 0) {
          this.gameOver();
        }
      }

      gameOver() {
        this.gameState = 'gameOver';
        clearInterval(this.interval);
        document.getElementById('pauseBtn').disabled = true;
        document.getElementById('startBtn').disabled = false;
        alert(`ゲームオーバー！スコア: ${this.score}`);
      }

      restart() {
        this.score = 0;
        this.lives = 3;
        this.level = 1;
        this.gameState = 'start';
        this.updateScore();
        this.updateLives();
        this.updateLevel();
        this.resetBall();
        this.bricks.forEach(b => b.classList.remove('destroyed'));
        document.getElementById('startBtn').disabled = false;
        document.getElementById('pauseBtn').disabled = true;
        document.getElementById('pauseBtn').textContent = '一時停止';
      }
    }

    // ゲームの初期化
    const game = new Game();
  </script>
</body>
</html>
